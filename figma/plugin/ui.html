<title>Color Tokens by NONOUN</title>
<style>/* styles.css — HCT Palette Generator UI.
   App-shell as a CSS grid; gallery, drawer, swatch, slider, analysis rail,
   ramp navigator, segmented inspector.

   DOGFOODING: the chrome themes itself with the tokens the tool generates. On
   boot app.js injects <style id="nonoun-color-tokens-theme"> — exportCSS() over the 8 default
   palettes — into <head>, emitting per-palette --{n}-{stop} raw vars and 37
   --c-{n}{suffix} semantic roles in :root. The app-internal variables below
   (--bg/--panel/--ink/--accent/…) are now thin aliases onto those generated
   --c-* roles, each with a CSS fallback so the chrome survives if a token is
   absent (e.g. the stylesheet loads before the <style> is injected).

   The chrome's neutral surfaces/text/borders come from the NEUTRAL palette's
   roles; accents from the PRIMARY palette; status from WARNING/DANGER/SUCCESS.
   Every --c-* role flips light/dark via light-dark(); the ◐ toggle sets
   color-scheme on :root (and <nonoun-color-tokens>) so the whole chrome flips with it. */

:root {
  color-scheme: light dark;

  /* ── surfaces / panels (neutral palette roles) ── */
  --bg:        var(--c-neutral-background, light-dark(#f4f5f8, #16181d));
  --panel:     var(--c-neutral-surface, light-dark(#ffffff, #1d2026));
  --panel-2:   var(--c-neutral-surface-low, light-dark(#fafbfc, #22252c));
  --container: var(--c-neutral-container, light-dark(#eef0f3, #262a32));
  /* ── text (neutral on-surface roles) ── */
  --ink:       var(--c-neutral-on-surface, light-dark(#15171c, #e9ebef));
  --ink-dim:   var(--c-neutral-on-surface-variant, light-dark(#5b6270, #9aa1ad));
  --ink-faint: var(--c-neutral-on-surface-variant, light-dark(#8a909c, #6b7280));
  /* ── borders / dividers (neutral outline roles) ── */
  --line:      var(--c-neutral-outline-variant, light-dark(#e2e5ea, #2e323b));
  --line-2:    var(--c-neutral-container-low, light-dark(#eef0f3, #262a32));
  /* ── primary actions / accents / active states (primary palette) ── */
  --accent:     var(--c-primary, light-dark(#0062d5, #5b9dff));
  --accent-ink: var(--c-primary-on-primary, #ffffff);
  --on-accent-soft: var(--c-primary-container, light-dark(#e7f0fe, #1b2a44));
  /* ── status (warning / danger / success palette primes) ── */
  --warn:      var(--c-warning, light-dark(#9a6a00, #e8b04b));
  --danger:    var(--c-danger, light-dark(#c0392b, #ff6b5b));
  --ok:        var(--c-success, light-dark(#1a7f37, #4ec76f));

  --shadow:    light-dark(0 1px 3px rgba(20,30,50,.12), 0 1px 3px rgba(0,0,0,.5));
  --shadow-lg: light-dark(0 12px 40px rgba(20,30,50,.22), 0 12px 40px rgba(0,0,0,.6));

  --r-sm: 5px;
  --r:    8px;
  --r-lg: 12px;
  /* control geometry — the one shared dimension across controls (switch + range thumb).
     A full (height−glyph)/2 size-ramp (component-inventory.md GRADE) would CHANGE pixels,
     so it is intentionally not derived here — it wants a visual pass. */
  --ctl-thumb: 15px;
  --hh: 48px;   /* header height */
  --ch: 42px;   /* canvas-header height */
  --fh: 30px;   /* footer height */

  --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
}
body {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

nonoun-color-tokens { display: block; height: 100vh; }
nonoun-color-tokens[data-theme="light"] { color-scheme: light; }
nonoun-color-tokens[data-theme="dark"]  { color-scheme: dark; }

/* Hidden scrollbars — content still scrolls; the bar is just not painted. Keeps the
   chrome clean and avoids the bright native scrollbar in a Figma plugin iframe. */
* { scrollbar-width: none; }                    /* Firefox / modern */
*::-webkit-scrollbar { width: 0; height: 0; }   /* WebKit */

button {
  font: inherit;
  color: var(--ink);
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--r-sm);
  cursor: pointer;
  padding: 4px 9px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  line-height: 1;
}
button:hover { background: var(--line-2); }
button.primary {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: transparent;
}
button.primary:hover { filter: brightness(1.07); }
button.ghost { border-color: var(--line); }
button.ghost:hover { background: var(--line-2); }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
/* SVG icon registry (icons.js): an inline-flex span carrying a currentColor <svg>; it inherits the
   surrounding color and centers on the text line, so an icon matches its button/label exactly. The
   button's own `gap` spaces an icon from adjacent label text. */
.ic { display: inline-flex; align-items: center; flex: none; vertical-align: middle; }
.ic svg { display: block; }
.ic.flip-x svg { transform: scaleX(-1); }   /* mirror (e.g. the right-pane sidebar toggle) */
/* non-button focusables (the ●/○ enable toggle is a role=button span) */
[role="button"]:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-radius: var(--r-sm); }
button:disabled, button[disabled] {
  opacity: .4; cursor: default; pointer-events: none;
}

input[type="text"], input[type="search"], select {
  font: inherit;
  color: var(--ink);
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 5px 8px;
  width: 100%;
}
input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

/* ───────────────────────── GALLERY ───────────────────────── */
.gallery { display: flex; flex-direction: column; height: 100%; }
.gallery-header {
  height: var(--hh);
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}
.gallery-header .brand { font-weight: 650; letter-spacing: -.01em; display: inline-flex; align-items: center; gap: 7px; }
.gallery-header .spacer { flex: 1; }
.gallery-body { flex: 1; overflow: auto; padding: 22px 24px; }
/* the "read a project that has no config yet" row — shown above the sets when the Figma file
   already carries a compatible raw-colors structure (renderFigmaImportRow). */
.figma-import-row {
  display: flex; align-items: center; gap: 12px;
  margin: 0 0 18px; padding: 12px 14px;
  border: 1px solid var(--accent); border-radius: var(--r);
  background: color-mix(in srgb, var(--accent) 8%, var(--panel));
}
.figma-import-row .fir-icon { color: var(--accent); font-size: 16px; }
.figma-import-row .fir-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.figma-import-row .fir-text strong { font-weight: 600; }
.figma-import-row .fir-sub { color: var(--ink-dim); font-size: 12px; }
.figma-import-row .spacer { flex: 1; }
.figma-import-row button { white-space: nowrap; }
/* the approximate (variable-derived) fallback reads as secondary, not the accented "exact" row. */
.figma-import-row.is-approx { border-color: var(--line); background: var(--panel-2); }
.figma-import-row.is-approx .fir-icon { color: var(--ink-faint); }
.gallery-title {
  display: flex; align-items: center; gap: 12px;
  margin: 0 0 18px;
}
.gallery-title h2 { margin: 0; font-size: 15px; font-weight: 600; }
.gallery-title .spacer { flex: 1; }
.gallery-title input[type="search"] { width: 220px; }

.set-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 16px;
  align-items: start; /* tiles size to their own content — don't stretch to the row's tallest (which
                         left an empty gap under shorter tiles). The fixed-height thumb then always fills. */
}
.set-tile {
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--panel);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform .08s ease, box-shadow .12s ease;
  text-align: left;
  padding: 0;
  display: block;
  width: 100%;
}
.set-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); background: var(--panel); }
.set-thumb { display: flex; flex-direction: column; height: 96px; position: relative; }
.set-thumb .strip { flex: 1; display: flex; }
.set-thumb .strip i { flex: 1; }
/* tile tags ride the preview itself (the palette count + the "preset" badge). A translucent
   dark scrim + white text keeps them legible over any strip color, in either chrome theme;
   pointer-events:none so a click still falls through to the tile button. */
.tile-tag {
  position: absolute; pointer-events: none;
  font-size: 9.5px; font-weight: 600; line-height: 1.4;
  text-transform: uppercase; letter-spacing: .06em;
  padding: 2px 7px; border-radius: 999px;
  background: rgba(0, 0, 0, .55); color: #fff;
  -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  font-variant-numeric: tabular-nums;
}
/* both tags sit along the bottom of the preview: count bottom-left, preset bottom-right. */
.tile-tag.tile-count { left: 8px; bottom: 8px; }
.tile-tag.tile-preset { right: 8px; bottom: 8px; }
/* the delete button overlays the preview top-right (same scrim language as the tags, but
   interactive — it carries its own click + stopPropagation, so it stays pointer-events:auto). */
.set-thumb .del {
  position: absolute; top: 6px; right: 6px;
  display: flex; align-items: center; justify-content: center;
  padding: 0; border: none; /* a real <button> now — drop the base button chrome */
  width: 22px; height: 22px; border-radius: 999px;
  font-size: 12px; line-height: 1; cursor: pointer;
  background: rgba(0, 0, 0, .55); color: #fff;
  -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
}
.set-thumb .del:hover { background: var(--danger); }
.set-meta { padding: 10px 12px; border-top: 1px solid var(--line-2); }
.set-meta .nm { font-weight: 600; }
.set-meta .sub { color: var(--ink-dim); font-size: 11.5px; margin-top: 2px; display: flex; gap: 6px; align-items: center; }

/* Travel-presets shelf: read-only tiles (no delete); reuse .set-tile. The "preset" tag now rides the preview. */
.gallery-title .title-count { color: var(--ink-faint); font-size: 12px; font-variant-numeric: tabular-nums; }

.new-tile {
  border: 1.5px dashed var(--line);
  border-radius: var(--r-lg);
  background: var(--panel-2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; min-height: 138px; cursor: pointer;
  color: var(--ink-dim); font-weight: 550;
}
.new-tile:hover { border-color: var(--accent); color: var(--accent); }
.new-tile .plus { font-size: 26px; line-height: 1; }
.empty-note { color: var(--ink-dim); padding: 40px 0; text-align: center; }

/* ───────────────────────── EDITOR SHELL ───────────────────────── */
.editor {
  display: grid;
  height: 100%;
  grid-template-columns: 290px 1fr 300px;
  grid-template-rows: var(--hh) 1fr var(--fh);
  grid-template-areas:
    "header header header"
    "left   center right"
    "footer footer footer";
  transition: grid-template-columns .18s ease;
}
/* Collapsible side panes: the toggles add these modifiers, which drive the side column to 0.
   The center column (1fr) reclaims the space as the track animates closed. The pane only truly
   clips to 0 with min-width:0 + the collapse-state padding/border reset below (see .left-pane). */
.editor.left-collapsed { grid-template-columns: 0 1fr 300px; }
.editor.right-collapsed { grid-template-columns: 290px 1fr 0; }
.editor.left-collapsed.right-collapsed { grid-template-columns: 0 1fr 0; }

.app-header {
  grid-area: header;
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}
.app-header .brand { font-weight: 650; letter-spacing: -.01em; white-space: nowrap; gap: 7px; }
/* the NONOUN brand mark (icons.js#brandMark) — inherits the wordmark's text color (--ink) */
.brand-mark { color: inherit; }
/* the brand doubles as the "back to gallery" affordance (replaced the ◀ Gallery button). */
.brand-link { cursor: pointer; display: inline-flex; align-items: center; padding: 4px 6px; margin-left: -6px; border-radius: var(--r-sm); }
.brand-link:hover { background: var(--line-2); }
.brand-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.app-header .docname {
  background: var(--panel-2); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: 4px 9px; max-width: 180px;
}
.app-header .spacer { flex: 1; }
/* pane-collapse toggles — one per side. While its pane is OPEN the toggle sits in that
   pane's own header (accented via .on); once collapsed it pops to the canvas-header. */
.pane-toggle {
  padding: 3px 8px; color: var(--ink-dim); flex: none;
  font-size: 12px; line-height: 1; letter-spacing: -.04em;
}
.pane-toggle.on { color: var(--accent); border-color: var(--accent); }

/* left pane = ANALYSIS rail (stacked, scrollable graphs for the selected palette) */
.left-pane {
  grid-area: left;
  border-right: 1px solid var(--line);
  background: var(--panel);
  overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  padding: 8px;
}
.pane-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink-faint);
  padding: 6px 8px 8px; display: flex; align-items: baseline; gap: 8px;
}
.pane-label .an-sel {
  text-transform: none; letter-spacing: 0; font-weight: 600;
  color: var(--accent); font-size: 11px;
}
/* the left toggle (when the pane is open) sits at the label's inner / canvas-side edge */
.pane-label .pane-toggle { margin-left: auto; align-self: center; }
.an-card {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 8px 8px 6px;
  margin-bottom: 8px;
}
.an-label {
  font-size: 10.5px; font-weight: 600; color: var(--ink-dim);
  margin-bottom: 4px;
}
.an-svg { display: flex; justify-content: center; }
.an-svg svg { display: block; max-width: 100%; height: auto; }
.an-svg.hw { padding-top: 2px; }
.an-empty { color: var(--ink-faint); padding: 14px 0; text-align: center; font-size: 11px; }

/* graph legend (keys the overlaid series) */
.an-legend { display: flex; flex-wrap: wrap; gap: 3px 10px; margin-top: 5px; font-size: 9.5px; color: var(--ink-dim); }
.an-leg { display: inline-flex; align-items: center; gap: 4px; }
.an-leg-mark { width: 12px; height: 3px; border-radius: 999px; flex: none; }
.an-leg-mark.solid { background: var(--accent); }
.an-leg-mark.faint { background: var(--ink-faint); }
.an-leg-mark.fill {
  height: 9px; border-radius: 2px;
  background: color-mix(in srgb, var(--accent) 16%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
}

/* analysis contrast bars */
.an-contrast { display: flex; flex-direction: column; gap: 6px; padding: 2px 0; }
.an-bar { display: flex; align-items: center; gap: 6px; font-size: 10.5px; }
.an-bar .an-bk { width: 46px; color: var(--ink-dim); flex: none; }
.an-bar .an-track {
  flex: 1; height: 7px; border-radius: 999px; background: var(--line);
  overflow: hidden; position: relative;
}
.an-bar .an-fill { display: block; height: 100%; background: var(--ok); border-radius: 999px; }
.an-bar .an-fill.bad { background: var(--warn); }
/* the 4.5:1 WCAG pass line, drawn over the fill so it reads as a fixed reference */
.an-bar .an-thresh { position: absolute; top: 0; bottom: 0; left: 64.3%; width: 1px; background: var(--ink); opacity: .55; z-index: 1; }
.an-bar b { width: 42px; text-align: right; font-variant-numeric: tabular-nums; }
.an-bar b.pass { color: var(--ok); }
.an-bar b.fail { color: var(--warn); }

/* hue wheel */
.hw-circle { fill: none; stroke: var(--line); stroke-width: 1.5; }
.hw-dot { stroke: var(--panel); stroke-width: 1.5; }
.hw-ring { fill: none; stroke: var(--accent); stroke-width: 1.5; }
.an-svg.hw text { fill: var(--ink-faint); font-size: 9px; font-family: var(--sans); }

/* center column = canvas-header / canvas-area / canvas-footer */
.center {
  grid-area: center;
  display: grid;
  grid-template-rows: var(--ch) 1fr var(--fh);
  min-width: 0; min-height: 0;
  background: var(--bg);
  position: relative; z-index: 0; /* the canvas column sits BELOW the panes (which are z-index 2) */
}
/* the panes always paint ABOVE the canvas (defends against any canvas-scene overflow).
   min-width:0 is load-bearing: grid items default to min-width:auto (= content min-content),
   so without it a pane refuses to shrink below its cards' width and OVERFLOWS the collapsed
   0-width track into the canvas. With it the 0 track is honored and overflow clips cleanly. */
.left-pane, .right-pane { position: relative; z-index: 2; min-width: 0; }
/* on collapse, also drop the pane's own padding + seam border so the track closes to a true 0
   (border-box can't compress padding/border into a 0 width, which would leave a ~17px strip). */
.editor.left-collapsed .left-pane { padding: 0; border-right-width: 0; overflow: hidden; }
.editor.right-collapsed .right-pane { padding: 0; border-left-width: 0; overflow: hidden; }
.canvas-header {
  display: flex; align-items: center; gap: 10px;
  padding: 0 12px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}
.canvas-header .spacer { flex: 1; }
.canvas-header .add-pal-btn { border: 1px dashed var(--line); }
.canvas-header .add-pal-btn:hover { border-color: var(--accent); color: var(--accent); }
.zoom-readout { color: var(--ink-dim); min-width: 42px; text-align: center; font-variant-numeric: tabular-nums; }

.canvas-area {
  position: relative;
  overflow: hidden;
  /* contain:paint force-clips composited descendants (the .canvas-scene has will-change:transform,
     which otherwise escapes overflow:hidden in Chromium → the canvas bled over the right pane). */
  contain: paint;
  min-height: 0;
  cursor: grab;
  touch-action: none; /* let pointer-drag pan, don't scroll the page */
  /* backdrop neutral comes from the global tonal range: lmax in light preview,
     lmin in dark preview (set inline as --canvas-bg by app.js#canvasBg). */
  background: var(--canvas-bg, var(--bg));
}
.canvas-area.panning { cursor: grabbing; }
/* canvas color-scheme — flips ONLY the preview's color-scheme, independent of app
   chrome; the backdrop fill itself is the lmin/lmax-derived --canvas-bg above. */
.canvas-area.canvas-scheme-light { color-scheme: light; }
.canvas-area.canvas-scheme-dark  { color-scheme: dark; }
.canvas-scene {
  position: absolute; top: 50%; left: 50%;
  transform-origin: 0 0;
  will-change: transform;
}
.origin-dot {
  position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; margin: -3px;
  border-radius: 50%; background: var(--ink-faint); opacity: .5;
  pointer-events: none; z-index: 1;
}

/* canvas = the ramps as the 2D space; each row IS the palette navigator */
.ramp-stack { display: flex; flex-direction: column; gap: 12px; padding: 4px; }
.ramp-row {
  display: flex; flex-direction: column; gap: 6px;
  padding: 8px; border-radius: var(--r);
  border: 1px solid transparent; cursor: pointer;
  background: color-mix(in srgb, var(--panel) 70%, transparent);
}
.ramp-row:hover { border-color: var(--line); }
.ramp-row.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
.ramp-row.off { opacity: .55; }
.ramp-head { display: flex; align-items: center; gap: 8px; }
.ramp-row .enable {
  flex: none; width: 18px; text-align: center; color: var(--ink-dim);
  border-radius: 4px; cursor: pointer;
}
.ramp-row .enable:hover { background: var(--line); color: var(--ink); }

/* drag handle (⋮⋮) — grabs the row for reorder; never pans the canvas / selects */
.ramp-row .drag-handle {
  flex: none; width: 16px; align-self: stretch;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint); cursor: grab; border-radius: 4px;
  touch-action: none; /* claim the pointer for drag, not page scroll */
  user-select: none;
}
.ramp-row .drag-handle::before {
  content: "⋮⋮"; font-size: 12px; letter-spacing: -2px; line-height: 1;
}
.ramp-row .drag-handle:hover { color: var(--ink); background: var(--line); }
.ramp-row .drag-handle:active { cursor: grabbing; }
nonoun-color-tokens.reordering { cursor: grabbing; }
nonoun-color-tokens.reordering .ramp-row { transition: transform .08s ease; }
/* drop indicator — a tinted edge on the row the drop will land before/after */
.ramp-row.drop-before { box-shadow: 0 -3px 0 -1px var(--accent); }
.ramp-row.drop-after { box-shadow: 0 3px 0 -1px var(--accent); }
.ramp-strip { display: flex; box-shadow: var(--shadow); border-radius: 6px; overflow: hidden; width: fit-content; }
.ramp-strip i {
  width: 26px; height: 40px; display: block; position: relative;
}
.ramp-strip i.oog::after {
  content: ""; position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent 0 4px, rgba(255,0,0,.45) 4px 5px);
}
.ramp-strip i:hover { outline: 2px solid var(--accent); outline-offset: -2px; z-index: 2; }

/* scrim view — 7 translucent 750-base overlays per palette, painted over a neutral
   checkerboard (the universal "this is translucent" indicator) so the alpha reads clearly. */
.scrim-strip { display: flex; box-shadow: var(--shadow); border-radius: 6px; overflow: hidden; width: fit-content; }
.scrim-cell {
  width: 26px; height: 40px; display: block; position: relative; --checker: 14px;
}
.scrim-fill { position: absolute; inset: 0; display: block; }
.scrim-cell:hover { outline: 2px solid var(--accent); outline-offset: -2px; z-index: 2; }
/* small scrim swatches for the right-pane sub-variant preview */
.scrim-cell.sm { width: 28px; height: 24px; }

/* Semantic Mapping view — a DATA TABLE in the canvas slot: scrolls, no pan/zoom. */
.canvas-area.is-table { cursor: default; overflow: hidden; }
.canvas-area.is-table .canvas-scene {
  position: static; transform: none !important; inset: auto;
  width: 100%; height: 100%; max-height: 100%; overflow: auto; display: block; padding: 14px;
}
.map-wrap { max-width: 720px; margin: 0 auto; }
.map-head { display: flex; align-items: baseline; gap: 10px; margin: 0 2px 10px; }
.map-head small { color: var(--ink-dim); }
.map-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
.map-table th { text-align: left; font-weight: 600; color: var(--ink-dim); padding: 8px 10px; border-bottom: 1px solid var(--line); background: var(--panel-2); position: sticky; top: 0; z-index: 1; }
.map-table td { padding: 5px 10px; border-bottom: 1px solid var(--line-2); }
.map-row.map-role-top td { border-top: 2px solid var(--line); }
.map-mode { color: var(--ink-dim); width: 52px; }
.map-table td.map-sw, .map-table th.map-sw { width: 30px; }
.map-swatch {
  position: relative; display: inline-block; width: 22px; height: 22px; border-radius: 5px;
  border: 1px solid var(--line); overflow: hidden; vertical-align: middle;
}
.map-swatch-fill { position: absolute; inset: 0; display: block; }

/* ── primitive: swatch (one color chip) ───────────────────────────────────────────
   A fixed-size color square (size via --sw). `.alpha` lays the fill over the shared
   checkerboard, which is defined ONCE here and reused by the composite cells
   (.scrim-cell, .map-swatch) that used to each copy it. */
.swatch {
  position: relative; display: inline-block; flex: none; vertical-align: middle;
  width: var(--sw, 16px); height: var(--sw, 16px);
  border-radius: 3px; border: 1px solid var(--line); overflow: hidden;
}
.swatch-fill { position: absolute; inset: 0; display: block; }
.swatch.alpha, .scrim-cell, .map-swatch {
  background-color: #fff;
  background-image:
    linear-gradient(45deg, #c9ced6 25%, transparent 25%, transparent 75%, #c9ced6 75%),
    linear-gradient(45deg, #c9ced6 25%, transparent 25%, transparent 75%, #c9ced6 75%);
  background-size: var(--checker, 10px) var(--checker, 10px);
  background-position: 0 0, calc(var(--checker, 10px) / 2) calc(var(--checker, 10px) / 2);
}
.map-table code { font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--ink); }
.map-sem code { color: var(--accent); font-weight: 600; }
/* the editable raw-token cell — a select menu, or a free text input (⇄ toggle in the head). */
.map-raw-select, .map-raw-input {
  font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
  padding: 2px 6px; border: 1px solid var(--line); border-radius: 5px;
  background: var(--panel-2); color: var(--ink); max-width: 210px;
}
.map-raw-input { width: 150px; }
.map-raw-select.ov, .map-raw-input.ov { border-color: var(--accent); color: var(--accent); font-weight: 600; }
.map-row.map-ov td.map-mode { box-shadow: inset 2px 0 0 var(--accent); }
.map-reset { border: none; background: none; cursor: pointer; color: var(--ink-dim); font-size: 13px; padding: 0 2px; margin-left: 4px; vertical-align: middle; }
.map-reset:hover { color: var(--accent); }
.map-head .spacer { flex: 1; }
.map-head .ghost { padding: 4px 10px; }
/* drift diff (#3) — does the file match what we'd generate? */
.map-file { width: 38px; text-align: center; }
.map-drift { display: inline-block; min-width: 16px; text-align: center; font-weight: 700; }
.map-drift-match { color: #2e9e5b; }
.map-drift-drift { color: #d9534f; }
.map-drift-absent, .map-drift-none { color: var(--ink-faint); font-weight: 400; }
/* ── primitive: chip (one in-flow pill) ───────────────────────────────────────────
   Status badge (<span>, optional tone) or interactive toggle (<button>, .on). Replaces
   the old .map-drift-sum and .damp-presets .preset pill stylings. */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 999px; border: 1px solid transparent;
  font-size: 11px; font-weight: 600; line-height: 1.4; color: var(--ink-dim);
}
button.chip { background: var(--panel-2); border-color: var(--line); cursor: pointer; }
button.chip:hover { background: var(--line-2); color: var(--ink); }
.chip.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); box-shadow: var(--shadow); }
.chip.in-sync { background: color-mix(in srgb, #2e9e5b 16%, transparent); color: #2e9e5b; }
.chip.has-drift { background: color-mix(in srgb, #d9534f 16%, transparent); color: #d9534f; }
.scrim-context { border: 1px solid var(--line); border-radius: var(--r); padding: 10px 12px; background: var(--panel-2); }
.scrim-ctx-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
.scrim-ctx-head small { color: var(--ink-dim); font-weight: 400; }
.scrim-ctx-strip { display: flex; border-radius: 5px; overflow: hidden; width: fit-content; box-shadow: var(--shadow); }
.scrim-ctx-note { margin: 8px 0 0; font-size: 12px; line-height: 1.4; color: var(--ink-dim); }
.ramp-name { font-weight: 600; color: var(--ink); }
.ramp-name.off { text-decoration: line-through; color: var(--ink-faint); }
.ramp-name small { color: var(--ink-dim); font-weight: 400; margin-left: 6px; }

/* shared analysis-graph SVG styles (left-pane graphs) */
/* differential damping controls + curve (Global tab) */
.sub-head { font-size: 10px; font-weight: 600; color: var(--ink-dim); margin: 0; text-transform: uppercase; letter-spacing: .05em; }
.mini-check { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-dim); margin: 0; cursor: pointer; }
.mini-check input { width: 13px; height: 13px; accent-color: var(--accent); cursor: pointer; }
.damp-presets { display: flex; flex-wrap: wrap; gap: 4px; }
/* the preset buttons are chips (.chip.on) — see the chip primitive above. */
.damp-graph { padding: 6px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--panel-2); }
.dg-unity { stroke: var(--ink-faint); stroke-width: 1; stroke-dasharray: 2 2; }

.lc-axis { stroke: var(--line); stroke-width: 1; }
.lc-ceiling { fill: color-mix(in srgb, var(--accent) 16%, transparent); stroke: none; }
.lc-toneline { stroke: var(--ink-faint); stroke-width: 1; stroke-dasharray: 3 3; fill: none; }
.lc-applied { stroke: var(--accent); stroke-width: 1.5; fill: none; }
.lc-dot { fill: var(--accent); }
.an-svg text { fill: var(--ink-dim); font-size: 9px; font-family: var(--sans); }

.canvas-footer, .app-footer {
  display: flex; align-items: center; gap: 14px;
  font-size: 11.5px; color: var(--ink-dim);
  padding: 0 12px; font-variant-numeric: tabular-nums;
}
.canvas-footer {
  border-top: 1px solid var(--line);
  background: var(--panel);
}
.canvas-footer .sw {
  width: 12px; height: 12px; border-radius: 3px; display: inline-block;
  border: 1px solid rgba(128,128,128,.4); vertical-align: -2px; margin-right: 4px;
}
.app-footer {
  grid-area: footer;
  border-top: 1px solid var(--line);
  background: var(--panel);
}
.app-footer .spacer { flex: 1; }
.app-footer .dirty { color: var(--warn); }
.app-footer .saved { color: var(--ok); }
.app-footer .warn { color: var(--warn); }

/* right-pane = segmented inspector [ Palette | Global | Roles ] */
.right-pane {
  grid-area: right;
  border-left: 1px solid var(--line);
  background: var(--panel);
  overflow: hidden;
  display: flex; flex-direction: column;
}
/* right-pane header row: the right toggle (when open) + the Inspector segmented control */
.pane-head { display: flex; align-items: center; gap: 8px; margin: 12px 14px 0; }
.pane-head .segmented { flex: 1; margin: 0; }
.segmented {
  /* no self-margin — the parent owns spacing (.pane-head provides it; .canvas-seg sits inline) */
  display: flex; gap: 2px;
  background: var(--panel-2); border: 1px solid var(--line);
  border-radius: var(--r); padding: 2px; flex: none;
}
.segmented button {
  flex: 1; border: none; border-radius: var(--r-sm); padding: 6px 8px;
  color: var(--ink-dim); font-weight: 550; justify-content: center;
}
.segmented button.on {
  background: var(--accent); color: var(--accent-ink); box-shadow: var(--shadow);
}
.segmented button:not(.on):hover { background: var(--line-2); color: var(--ink); }
/* canvas-header variant of .segmented — inline + compact (no right-pane margins, auto-width). */
.canvas-seg { margin: 0; }
.canvas-seg button { flex: 0 0 auto; padding: 5px 14px; }
.seg-body { flex: 1; overflow: auto; padding: 14px; }
/* live component preview — pinned below the panel on every tab, painted from the
   selected palette's semantic roles (surface / onSurface / onSurfaceVariant / primary). */
.seg-example { flex: none; border-top: 1px solid var(--line); padding: 14px; background: var(--panel); }
.example-card { border-radius: 14px; padding: 16px 18px; }
.ex-title { font-weight: 700; font-size: 15px; line-height: 1.2; }
.ex-sub { font-size: 13px; margin-top: 3px; }
.ex-btn {
  margin-top: 14px; border: none; border-radius: 10px;
  padding: 9px 18px; font-weight: 650; font-size: 14px; cursor: default;
}
/* the palette/global inspector bodies own spacing via a column gap, so no child sets its
   own outer margin (the "components don't own outer margin" rule). Uniform 14px rhythm. */
.insp-body { display: flex; flex-direction: column; gap: 14px; }
.insp-title { font-size: 14px; font-weight: 650; margin: 0; display: flex; align-items: center; gap: 8px; }
.insp-sub { color: var(--ink-dim); font-size: 11.5px; margin: 0; }
.field { margin: 0; }
.field > label {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 11.5px; color: var(--ink-dim); margin-bottom: 5px;
}
.field > label b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
.row { display: flex; align-items: center; gap: 8px; }

input[type="range"] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
  background: var(--line); border-radius: 999px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: var(--ctl-thumb); height: var(--ctl-thumb); border-radius: 50%;
  background: var(--accent); border: 2px solid var(--panel);
  box-shadow: var(--shadow); cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: var(--ctl-thumb); height: var(--ctl-thumb); border-radius: 50%;
  background: var(--accent); border: 2px solid var(--panel); cursor: pointer;
}

/* switchControl() — a <button role=switch>. Neutralise the base button chrome
   (padding/border/hover bg) so only the track + label show; the platform gives it
   :focus-visible and Enter/Space toggling for free. */
.toggle {
  display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
  padding: 0; border: none; border-radius: 0; background: none;
  color: var(--ink); font: inherit; line-height: 1;
}
.toggle:hover { background: none; }
.toggle .track {
  width: 34px; height: 19px; border-radius: 999px; background: var(--line);
  position: relative; transition: background .12s;
}
.toggle .track::after {
  content: ""; position: absolute; top: 2px; left: 2px;
  width: var(--ctl-thumb); height: var(--ctl-thumb); border-radius: 50%; background: #fff;
  box-shadow: var(--shadow); transition: transform .12s;
}
.toggle.on .track { background: var(--accent); }
.toggle.on .track::after { transform: translateX(15px); }

.insp-actions { display: flex; gap: 8px; padding-top: 14px; border-top: 1px solid var(--line); }
.insp-actions .danger:hover { color: var(--danger); }

/* ── key colors — retained brand colors (canvas row + inspector editor) ──────────── */
/* canvas: a row of brand swatches above the ramp, each captioned with its nearest stop. */
.key-strip { display: flex; gap: 6px; margin-bottom: 6px; }
.key-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.key-cell .key-fill { width: 54px; height: 26px; border-radius: 6px; border: 1px solid var(--line); box-shadow: var(--shadow); }
.key-cell small { font-size: 9px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
/* inspector: two big expression swatches — `dominant` + `supportive`, each ≈ half width. */
.key-colors .key-slots { display: flex; gap: 8px; margin-top: 6px; }
.key-slot { flex: 1; min-width: 0; border-radius: var(--r); }
.key-slot.filled { display: flex; flex-direction: column; }
.key-slot .key-fill { height: 56px; border-radius: var(--r); border: 1px solid var(--line); box-shadow: var(--shadow); }
.key-slot .key-meta { display: flex; align-items: baseline; justify-content: space-between; gap: 6px; margin-top: 5px; }
.key-slot .key-role { font-size: 11px; font-weight: 600; text-transform: capitalize; color: var(--ink); }
.key-slot .key-place { font-size: 10.5px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
.key-slot .key-acts { display: flex; gap: 2px; margin-top: 4px; }
.key-slot .key-act { padding: 2px 6px; color: var(--ink-dim); }
.key-slot .key-act:hover { color: var(--ink); background: var(--line-2); }
/* empty slot — a dashed add tile with the same footprint as a filled swatch. */
.key-slot.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  height: 84px; border: 1.5px dashed var(--line); background: var(--panel-2);
  color: var(--ink-dim); font-size: 11px; font-weight: 550;
}
.key-slot.empty:hover { border-color: var(--accent); color: var(--accent); background: var(--panel-2); }

/* ── curated story — per-color line (Palette tab) ────────────────────────────────── */
.color-story { padding: 8px 10px; border-radius: var(--r-sm); background: var(--panel-2); border: 1px solid var(--line); }
.color-story-name { font-size: 12px; font-weight: 600; color: var(--ink); display: flex; align-items: baseline; gap: 6px; }
.color-role { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); flex: none; }
.color-story-note { margin: 4px 0 0; font-size: 11.5px; line-height: 1.45; color: var(--ink-dim); }

/* ── Story tab (holistic concept view) ───────────────────────────────────────────── */
.story-pane { font-size: 12.5px; }
.story-kicker { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-faint); }
.story-title { font-family: Georgia, "Times New Roman", serif; font-size: 17px; font-weight: 600; line-height: 1.25; margin: 5px 0 0; }
.story-narrative { margin: 10px 0 0; font-size: 12.5px; line-height: 1.55; color: var(--ink-dim); }
.story-colors { display: flex; flex-direction: column; gap: 9px; margin: 16px 0 0; }
.story-color { display: flex; gap: 10px; }
.story-swatch { flex: none; width: 40px; height: 40px; border-radius: var(--r-sm); border: 1px solid var(--line); box-shadow: var(--shadow); }
.story-color-meta { min-width: 0; }
.story-color-name { font-size: 12px; font-weight: 600; display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
.story-color-note { margin: 2px 0 0; font-size: 11.5px; line-height: 1.4; color: var(--ink-dim); }
.story-groups { display: flex; flex-direction: column; gap: 9px; margin: 16px 0 0; padding-top: 14px; border-top: 1px solid var(--line); }
.story-group-head { display: flex; align-items: baseline; gap: 8px; }
.story-group-head b { font-size: 11px; text-transform: capitalize; }
.story-group-pct { font-size: 11px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
.story-group p { margin: 2px 0 0; font-size: 11.5px; line-height: 1.4; color: var(--ink-dim); }
.story-refuses { margin: 16px 0 0; padding-top: 14px; border-top: 1px solid var(--line); }
.story-refuses b { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--danger); }
.story-refuses p { margin: 5px 0 0; font-size: 11.5px; line-height: 1.5; color: var(--ink-dim); font-style: italic; }

/* ── gallery preset shelf — grouped by VOLUME ────────────────────────────────────── */
.preset-shelf { display: flex; flex-direction: column; gap: 24px; }
.preset-vol-head { margin-bottom: 12px; }
.preset-vol-num { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); }
.preset-vol-title { font-size: 15px; font-weight: 600; color: var(--ink); margin-left: 8px; }
.preset-vol-intro { margin: 5px 0 0; font-size: 12.5px; line-height: 1.5; color: var(--ink-dim); max-width: 78ch; }

.roles-table { font-size: 11px; }
.roles-table .rrow { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.roles-table .rrow.rhead { color: var(--ink-faint); font-weight: 600; border-bottom: 1px solid var(--line); padding-bottom: 5px; margin-bottom: 3px; }
.roles-table .rrow .k { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.roles-table .rrow .suf { width: 92px; flex: none; color: var(--ink-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.roles-table .rrow .sw-pair { display: flex; gap: 3px; flex: none; align-items: center; }
.roles-table .rrow.rhead .sw-pair { gap: 6px; }
.roles-table .rrow.rhead .sw-pair span { width: 16px; text-align: center; }

/* ───────────────────────── EXPORT DRAWER ───────────────────────── */
.drawer-scrim {
  position: fixed; inset: 0; background: rgba(10,14,22,.34);
  z-index: 40; opacity: 0; pointer-events: none; transition: opacity .14s;
}
.drawer-scrim.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; right: 0; height: 100%; width: 480px; max-width: 92vw;
  background: var(--panel); border-left: 1px solid var(--line);
  box-shadow: var(--shadow-lg); z-index: 41;
  transform: translateX(100%); transition: transform .18s ease;
  display: flex; flex-direction: column;
}
.drawer.open { transform: none; }
.drawer-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
}
.drawer-head h3 { margin: 0; font-size: 14px; }
.drawer-head .spacer { flex: 1; }
/* export-format picker — a grouped <select> (the flat tab row outgrew the drawer at 9 formats). */
.drawer-format { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--line); }
.drawer-format label { font-size: 11.5px; color: var(--ink-dim); font-weight: 600; flex: none; }
.drawer-format select { width: auto; min-width: 150px; flex: none; }
/* Figma sub-bar: the import hint on its own row, then [mode-file segmented | Binder plugin] below. */
.figma-bar { display: flex; flex-direction: column; align-items: stretch; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--line); }
.figma-bar-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.figma-files { display: flex; gap: 2px; background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 2px; }
.figma-files button { border-radius: var(--r-sm); padding: 4px 10px; font-size: 11.5px; font-weight: 550; color: var(--ink-dim); }
.figma-files button.on { background: var(--accent); color: var(--accent-ink); }
.figma-note { color: var(--ink-dim); font-size: 11px; line-height: 1.5; }
.figma-plugin-btn { white-space: nowrap; }
/* Config sub-bar: the project source-of-truth actions sit ABOVE the code (not in the footer). */
.config-bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
.config-note { color: var(--ink-dim); font-size: 11px; flex: 1; min-width: 160px; }
/* the code block hosts a floating copy affordance in its top-right corner. */
.drawer-code { position: relative; flex: 1; min-height: 0; display: flex; }
.copy-float {
  position: absolute; top: 8px; right: 16px; z-index: 2;
  padding: 4px 9px; font-size: 11.5px; gap: 5px;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-sm);
  color: var(--ink-dim); box-shadow: var(--shadow);
}
.copy-float:hover { background: var(--line-2); color: var(--ink); }
.drawer-pre {
  flex: 1; overflow: auto; margin: 0; padding: 14px 16px;
  font-family: var(--mono); font-size: 11.5px; line-height: 1.5;
  background: var(--panel-2); white-space: pre; tab-size: 2;
  color: var(--ink);
}
.drawer-foot {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-top: 1px solid var(--line);
  flex-wrap: wrap; /* footer actions wrap to a 2nd row rather than clipping (narrow plugin window) */
}
.drawer-foot .meta { color: var(--ink-dim); font-size: 11.5px; flex: 1; min-width: 140px; font-variant-numeric: tabular-nums; }
/* the two footer buttons travel together (Apply left, Download right) — never split across rows.
   The group wraps as a UNIT under the meta on a narrow plugin window; its own buttons stay side by side. */
.drawer-foot .foot-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }

/* ── responsive toolbars — the plugin window can be narrow; toolbars must never overflow ── */
/* never break a button's own label across lines (no 3-line "⚑ Add Variables → Figma"). */
.app-header button, .canvas-header button, .drawer-foot button, .drawer-head button { white-space: nowrap; }
@media (max-width: 1240px) { /* tighten the fixed-height header toolbars so buttons still fit */
  .app-header, .canvas-header { gap: 6px; }
  .app-header button, .canvas-header button { padding: 4px 7px; }
  .canvas-seg button { padding: 5px 10px; }
  .segmented button { padding: 5px 8px; }
}

.toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--bg);
  padding: 9px 16px; border-radius: var(--r); box-shadow: var(--shadow-lg);
  z-index: 60; opacity: 0; transition: opacity .15s, transform .15s; font-size: 12.5px;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── forced-colors / Windows High Contrast ─────────────────────────────────────────
   The custom-painted controls (switch track, active segment/tab, slider thumb, chips)
   lose their var(--accent) fills when the OS substitutes its own palette — background
   colors are forced to Canvas unless they are SYSTEM color keywords. Re-assert on/off +
   active state with Highlight / ButtonText so the controls stay legible in High Contrast
   (the native-parity affordance the inventory found missing everywhere). */
@media (forced-colors: active) {
  /* switch — border the track, fill the thumb; Highlight marks ON. */
  .toggle .track { border: 1px solid ButtonText; }
  .toggle .track::after { background: ButtonText; }
  .toggle.on .track { background: Highlight; }
  .toggle.on .track::after { background: HighlightText; }
  /* segmented control, tabs, and the active chip — Highlight-filled when selected. */
  .segmented button.on, .canvas-seg button.on,
  .figma-files button.on, .chip.on {
    background: Highlight; color: HighlightText;
  }
  /* status chips keep a border so the tinted pill still reads as a bounded badge. */
  .chip { border-color: ButtonText; }

  input[type="range"] { background: ButtonText; }
  input[type="range"]::-webkit-slider-thumb { background: Highlight; border: 1px solid ButtonText; }
  input[type="range"]::-moz-range-thumb { background: Highlight; border: 1px solid ButtonText; }
}

  code: "// figma-semantic-binder/code.js — the HCT cascade binder runtime.\n//\n// Runs inside Figma (uses the `figma` global). It gives the live raw->semantic cascade that\n// native JSON import cannot (knowledge-05 §1): each semantic role is aliased to the REAL raw\n// Variable object via figma.variables.createVariableAlias, so editing a raw color propagates\n// to every semantic role that aliases it.\n//\n// OFFLINE (ADR-010 / AC-P3): no network I/O. No fetch / XMLHttpRequest / WebSocket / dynamic\n// import() of a remote URL / figma.showUI to a remote origin. manifest.networkAccess === \"none\".\n//\n// PARITY: the binding loop below MIRRORS ../bind-plan.mjs (bindingPlan / bindingTargets) — the\n// same role table, the same refKey normaliser, the same \"{n}/{refKey(ref)}\" target grammar.\n// bind-plan.mjs is the pure, harness-tested source of truth; this file replicates it verbatim\n// because Figma plugin code runs in a non-module sandbox and cannot import the .mjs at run time.\n// Both derive from the validated capability.system.semantic-mapping role table. Because every\n// target is refKey() of a ref from that table (solid stop -> pad3 \"050\"; scrim base 250/500/750\n// with alpha% = step/10 -> \"{base}-{step}\" verbatim), every emitted \"{n}/{refKey}\" is a member of\n// the canonical raw-colors name set — no unpadded \"{n}/50\", no out-of-range \"{n}/500-999\".\n\nconst RAW_COLLECTION = \"raw-colors\";\nconst SEMANTIC_COLLECTION = \"semantic-colors\";\n\n// The 8 default palettes (knowledge-05 §3; defaults[].name in data/role-table.json).\nconst PALETTES = [\n  \"neutral\",\n  \"primary\",\n  \"secondary\",\n  \"tertiary\",\n  \"info\",\n  \"success\",\n  \"danger\",\n  \"warning\",\n];\n\n// refKey: mirror of semantic.js / bind-plan.mjs. Solid stops zero-pad to 3 digits\n// (\"50\" -> \"050\"); scrim refs (\"500-200\") keep the \"-step\" suffix and pad the base stop.\nfunction refKey(ref) {\n  const s = String(ref);\n  const dash = s.indexOf(\"-\");\n  if (dash === -1) return s.padStart(3, \"0\");\n  return s.slice(0, dash).padStart(3, \"0\") + s.slice(dash);\n}\n\n// roleTable(n) — the 37 roles for a palette, name-substituted exactly as semantic.js /\n// bind-plan.mjs produce them: accent + on-accent keys carry the palette name; shared roles do\n// not. Refs are the canonical values from data/role-table.json (validated semantic-mapping).\n// `key` is the semantic variable name part (\"{n}/{key}\"); `light`/`dark` feed targetName.\nfunction roleTable(n) {\n  const N = n.charAt(0).toUpperCase() + n.slice(1);\n  return [\n    // 1. ACCENT — name-prefixed; prime role has empty suffix.\n    { key: n, suffix: \"\", light: \"550\", dark: \"450\" },\n    { key: n + \"Dim\", suffix: \"-dim\", light: \"650\", dark: \"700\" },\n    { key: n + \"Bright\", suffix: \"-bright\", light: \"350\", dark: \"400\" },\n    { key: n + \"Low\", suffix: \"-low\", light: \"350\", dark: \"700\" },\n    { key: n + \"High\", suffix: \"-high\", light: \"650\", dark: \"400\" },\n\n    // 2. ON-ACCENT — name-prefixed; fixed to the light end in BOTH modes (OD-001).\n    { key: \"on\" + N, suffix: \"-on-\" + n, light: \"50\", dark: \"50\" },\n    { key: \"on\" + N + \"Variant\", suffix: \"-on-\" + n + \"-variant\", light: \"200\", dark: \"200\" },\n\n    // 3. ON-SURFACE — shared.\n    { key: \"onSurface\", suffix: \"-on-surface\", light: \"950\", dark: \"50\" },\n    { key: \"onSurfaceVariant\", suffix: \"-on-surface-variant\", light: \"750\", dark: \"250\" },\n\n    // 4. OUTLINE — shared; on the 500 scrim ramp (light === dark).\n    { key: \"outline\", suffix: \"-outline\", light: \"500-600\", dark: \"500-600\" },\n    { key: \"outlineVariant\", suffix: \"-outline-variant\", light: \"500-400\", dark: \"500-400\" },\n\n    // 5. CONTAINER — shared; on the 500 scrim ramp (light === dark).\n    { key: \"container\", suffix: \"-container\", light: \"500-200\", dark: \"500-200\" },\n    { key: \"containerLow\", suffix: \"-container-low\", light: \"500-100\", dark: \"500-100\" },\n    { key: \"containerHigh\", suffix: \"-container-high\", light: \"500-300\", dark: \"500-300\" },\n\n    // 6. SCRIM — shared; 7 strengths on the 500 ramp (alpha% = step/10), mode-independent.\n    //    Sequential 5–60%: weakest..strongest = 50/100/200/300/400/500/600.\n    { key: \"scrimWeakest\", suffix: \"-scrim-weakest\", light: \"500-50\", dark: \"500-50\" },\n    { key: \"scrimWeaker\", suffix: \"-scrim-weaker\", light: \"500-100\", dark: \"500-100\" },\n    { key: \"scrimWeak\", suffix: \"-scrim-weak\", light: \"500-200\", dark: \"500-200\" },\n    { key: \"scrim\", suffix: \"-scrim\", light: \"500-300\", dark: \"500-300\" },\n    { key: \"scrimStrong\", suffix: \"-scrim-strong\", light: \"500-400\", dark: \"500-400\" },\n    { key: \"scrimStronger\", suffix: \"-scrim-stronger\", light: \"500-500\", dark: \"500-500\" },\n    { key: \"scrimStrongest\", suffix: \"-scrim-strongest\", light: \"500-600\", dark: \"500-600\" },\n\n    // 7. INVERSE — shared.\n    { key: \"inverseSurface\", suffix: \"-inverse-surface\", light: \"900\", dark: \"100\" },\n    { key: \"inverseOnSurface\", suffix: \"-inverse-on-surface\", light: \"50\", dark: \"950\" },\n\n    // 8. SURFACE — shared base surfaces.\n    { key: \"background\", suffix: \"-background\", light: \"100\", dark: \"900\" },\n    { key: \"surface\", suffix: \"-surface\", light: \"125\", dark: \"875\" },\n\n    // 9. SURFACE DIM/BRIGHT — shared; non-mirror.\n    { key: \"surfaceDimmest\", suffix: \"-surface-dimmest\", light: \"200\", dark: \"950\" },\n    { key: \"surfaceDimmer\", suffix: \"-surface-dimmer\", light: \"175\", dark: \"925\" },\n    { key: \"surfaceDim\", suffix: \"-surface-dim\", light: \"150\", dark: \"900\" },\n    { key: \"surfaceBright\", suffix: \"-surface-bright\", light: \"100\", dark: \"850\" },\n    { key: \"surfaceBrighter\", suffix: \"-surface-brighter\", light: \"75\", dark: \"825\" },\n    { key: \"surfaceBrightest\", suffix: \"-surface-brightest\", light: \"50\", dark: \"800\" },\n\n    // 10. SURFACE LOW/HIGH — shared; mirror (sum 1000).\n    { key: \"surfaceLowest\", suffix: \"-surface-lowest\", light: \"50\", dark: \"950\" },\n    { key: \"surfaceLower\", suffix: \"-surface-lower\", light: \"75\", dark: \"925\" },\n    { key: \"surfaceLow\", suffix: \"-surface-low\", light: \"100\", dark: \"900\" },\n    { key: \"surfaceHigh\", suffix: \"-surface-high\", light: \"150\", dark: \"850\" },\n    { key: \"surfaceHigher\", suffix: \"-surface-higher\", light: \"175\", dark: \"825\" },\n    { key: \"surfaceHighest\", suffix: \"-surface-highest\", light: \"200\", dark: \"800\" },\n  ];\n}\n\n// The raw-colors target a ref resolves to: \"{n}/{refKey(ref)}\" — the load-bearing grammar.\n// Identical to bind-plan.mjs targetName; guarantees membership in the canonical raw name set.\nfunction targetName(paletteName, ref) {\n  return paletteName + \"/\" + refKey(ref);\n}\n\nasync function main() {\n  const collections = await figma.variables.getLocalVariableCollectionsAsync();\n  const rawColl = collections.find((c) => c.name === RAW_COLLECTION);\n  if (!rawColl) {\n    figma.notify(\"Raw collection not found: \" + RAW_COLLECTION);\n    figma.closePlugin();\n    return;\n  }\n\n  // 1. Index raw-colors variables by name.\n  const allVars = await figma.variables.getLocalVariablesAsync();\n  const rawVars = {};\n  for (const v of allVars) {\n    if (v.variableCollectionId === rawColl.id) rawVars[v.name] = v;\n  }\n\n  // 2. Create/find the semantic-colors collection with Light + Dark modes.\n  let sem = collections.find((c) => c.name === SEMANTIC_COLLECTION);\n  if (!sem) sem = figma.variables.createVariableCollection(SEMANTIC_COLLECTION);\n  const lightMode = sem.modes[0].modeId;\n  const darkMode = (sem.modes[1] && sem.modes[1].modeId) || sem.addMode(\"Dark\");\n\n  // 3. For each palette and role, resolve lt/dt = rawVars[\"{n}/{refKey(...)}\"] and alias both\n  //    modes by reference (the cascade). Mirrors bind-plan.mjs.bindingPlan.\n  let bound = 0;\n  const missing = [];\n  for (const n of PALETTES) {\n    for (const r of roleTable(n)) {\n      const ltName = targetName(n, r.light);\n      const dtName = targetName(n, r.dark);\n      const lt = rawVars[ltName];\n      const dt = rawVars[dtName];\n      if (!lt) { missing.push(ltName); continue; }\n      if (!dt) { missing.push(dtName); continue; }\n\n      const semName = n + \"/\" + r.key;\n      const refreshed = await figma.variables.getLocalVariablesAsync();\n      const semVar =\n        refreshed.find((v) => v.variableCollectionId === sem.id && v.name === semName) ||\n        figma.variables.createVariable(semName, sem, \"COLOR\");\n\n      semVar.setValueForMode(lightMode, figma.variables.createVariableAlias(lt));\n      semVar.setValueForMode(darkMode, figma.variables.createVariableAlias(dt));\n      bound++;\n    }\n  }\n\n  figma.notify(\n    \"Bound \" + bound + \" roles\" + (missing.length ? (\", missing raw target: \" + missing[0]) : \"\")\n  );\n  figma.closePlugin();\n}\n\nmain();\n",
};

const TRAVEL_VOLUMES = {"I":{"title":"Four palettes, four territories.","intro":"The category defaults are rejected as primary signal: Santorini blue, resort turquoise, safari ochre, foliage red. They are not wrong — they are unearned without specific cultural grounding. Each palette is sourced from three places only — the territory's material culture, its specific light condition, and the historical pigment tradition available to the people of the place. The test is recognition: someone who has been here should know the palette without seeing the label."},"II":{"title":"Four more territories, further from the postcard.","intro":"This volume pushes harder against the category default. Tokyo is not sakura pink; Lisbon is not azulejo blue as primary; Iceland is not aurora green; Kerala is not backwater turquoise. Each is a specific hour and a specific surface — read the kicker before the swatches. As before: every swatch names its material, pigment, or light source. The hierarchy is enforced. The refuses line is part of the spec, not editorial flavour."},"III":{"title":"Four more interiors, mostly at night or under weather.","intro":"Volume III leans inward. Three of the four territories are interiors — a felt-walled ger, a Viennese kaffeehaus, an adobe house seen between mountain stops — and the fourth is a Faroese harbour so thickly fogged that it reads as an interior anyway. Light here is small, local, and almost always from below or behind. As before: every swatch names its source. The hierarchy is enforced. The refuses line names the colour that would betray the territory."},"IV":{"title":"Four shorelines, four hours of working light.","intro":"Coastal palettes are the most pre-conquered category in the colour world: resort turquoise, postcard cobalt, white-sand cream. Every territory in this volume refuses one of those defaults outright, because the real working coast — a Newfoundland outport, a Mumbai koliwada, a Breton quay, a Hokkaido kelp shore — does not look like the brochure. Each palette names its hour, its weather, and the material being worked. Primary by surface area, secondary by frequency, accent by punctuation. The refuses line names the postcard."},"V":{"title":"Four palettes from thinner air, three months from peak season.","intro":"Altitude does things to colour: less atmosphere to scatter blue, more UV to bleach reds, ground that holds heat unevenly between sun and shadow. These four territories are sampled in the working season, not the photographer's golden hour: a Khumbu teahouse at supper, Cuzco's plaza in winter morning, a Dolomites refuge at season's end, a Ladakhi monastery at dusk. Each one refuses an obvious tourist signifier — saturated red on the prayer flag, the woven-textile rainbow, the apres-ski neon, the saffron-robe orange — and finds the colour in the wall, the smoke, the stove, the snow."},"VI":{"title":"Four cities, after dark, off the tourist hour.","intro":"Cities at night are mostly sodium and shadow. The brand colours that work at noon — Buenos Aires's blue-and-white, Istanbul's tile, Hanoi's lacquer, Tbilisi's gold — recede; the working palette is the streetlamp and the asphalt. Each of these four refuses the daytime cliché: the tango red, the Marmara turquoise, the jungle green, the cathedral gold. The dominant in every case is a working surface, not a brand."},"VII":{"title":"Four markets, working hours, not the food-tour version.","intro":"Markets are the densest single source of material culture in any city — and the most over-pictured. The strategy here is to find the dominant working colour, not the most photogenic stall. Counter wood. Vendor apron. Drying mat. Tile back-of-house. Each palette names the pigment, the textile, or the cured material that anchors it. Pagoda gold, designer azulejo, rainbow ethnic-textile, Mediterranean cobalt — all refused in their place."},"VIII":{"title":"Four trains, four hours not on the brochure.","intro":"Train palettes are mostly engineered — the upholstery and the panel are spec'd by a transport authority, not by light. So the strategy is to find the engineering palette and then admit the one or two outside colours that survive the journey: the window, the platform, the conductor's uniform, the dining-car cloth. Each of these refuses the easy outside-the-train postcard — the aurora, the Cycladic blue, the Outback turquoise, the spice quarter. The dominant is always something the railway chose."},"IX":{"title":"Four palettes from rooms made for ritual, at the hour the ritual happens.","intro":"Sacred spaces are designed for one moment: midnight, dawn, dusk, the hour the procession arrives. Sampling them outside that hour gives a museum colour; sampling them during it gives a working colour. Every palette here is the used version of the space. Each refuses an outsider's signifier — cathedral cool blue, candy cherry-blossom pink, orientalist lavender, Halloween orange-and-black. The dominant is always the surface the rite is performed on."},"X":{"title":"Four deserts, four very different reasons nothing grows.","intro":"Deserts get treated as one category; they are not. The Empty Quarter is sand and sky, Wadi Rum is sandstone and basalt, the Skeleton Coast is fog and bone, the Great Salt Lake is hypersaline brine. Each makes a different palette refusal mandatory. Specifically: oil-money gold, Petra-rose monochrome, safari-poster orange, lagoon-turquoise. Each is the wrong colour for its territory and is named in the refuses line."},"XI":{"title":"Four forests, no fairy tales, just the ground cover and the canopy.","intro":"Forest palettes are almost always rendered as green-on-green; in working forests, green is rarely the dominant. The Tongass is gloom; the Schwarzwald is canopy-dark; the Atchafalaya is grey; the Kamchatkan taiga is overcast. Each refuses an external marketing colour — calendar teal, Grimm-tourism red, neon-bayou magenta, Kamchatka-poster glacier-teal. The dominant is what you actually walk on or stand under."},"XII":{"title":"Four palettes from the wrong week to be there.","intro":"Every territory has a wrong week — the season the brochures don't show. Plum-rain in a Chinese tea region. Latvian winter. Typhoon afternoon on Okinawa. July fog at Point Reyes. The palettes that show up in those weeks are the territory's truer ones, because nobody is curating them. Each refuses the in-season postcard: spring cherry blossom, Baltic-summer blue, Okinawa-resort turquoise, California-poster sunshine. The dominant is the weather the photographer skipped."}};

  {"name":"MV passing Kea, en route Piraeus","vol":"I","story":{"title":"The fluorescent-lit passenger lounge of an off-season ferry, an hour before docking","kicker":"37° N · November · 05:40 · MV passing Kea, en route Piraeus","narrative":"Color from a working ship, not a postcard: grey-green Aegean swell with no plankton bloom, weathered fibreglass hull paint, diesel sheen on the water along the rail, a single overhead T8 fluorescent tube in the saloon, the funnel stripe sun-faded almost to grey. The horizon is barely distinguishable from the water. This is the Greek islands as the people who actually use the ferries see them.","refuses":"Cycladic cerulean and bleach-bone white. That palette is high summer at Oia; this is November at five a.m. on a working route — the same archipelago, an unrelated colour world.","groups":[{"hier":"d","pct":55,"note":"Aegean grey-green; the colour you spend the night staring at through the window."},{"hier":"s","pct":35,"note":"Weathered fibreglass, horizon grey, faded indigo — the ship's own muted vocabulary."},{"hier":"a","pct":10,"note":"Diesel and fluorescent only as flicker; introduce them anywhere larger and the palette stops being honest."}]},"curve":"logistic","tension":0,"lmin":5,"lmax":100,"damp":70,"dampCurve":1.5,"dampAmp":55,"dampBias":0,"hueSpace":"cam16","relChroma":false,"chromaFloor":40,"toneMode":"perceptual","vibrancy":0,"palettes":[{"name":"primary-base","hue":174,"chroma":12,"skew":0,"lift":5,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.522,0.026,168]}],"colorName":"November Aegean swell, grey-green","description":"Aegean water in late autumn: no algal bloom, no resort blue, churned grey-green under overcast.","colorRole":"dominant","on":true},{"name":"primary-muted","hue":272,"chroma":25,"skew":0,"lift":-8,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.42,0.062,268]}],"colorName":"Funnel stripe, faded indigo enamel","description":"Company colour on th   {"name":"Yamanote line, last loop, between Shinjuku and Ikebukuro","vol":"II","story":{"title":"The last train of the night, fluorescent-lit, with the overcoat-thick warmth of a hundred salarymen leaning on the windows","kicker":"35° N · February · 23:48 · Yamanote line, last loop, between Shinjuku and Ikebukuro","narrative":"Color from a Japanese commuter rail car after midnight in winter: cool fluorescent saloon white, the navy wool of suit overcoats, JR East moquette upholstery, the Shōwa-era cream tile of the platform walls. The accents are the wet-pavement spill of side-street neon and the faded red of a vending machine in the underpass.","refuses":"Cherry-blossom pink. Sakura belongs to a Hanami picnic in April; using it in a Tokyo palette without naming the hour collapses the city into a tourism poster.","groups":[{"hier":"d","pct":55,"note":"Saloon white reads from every flat surface inside the car."},{"hier":"s","pct":35,"note":"Platform cream, salaryman navy, moquette plum — the resting surfaces of the system."},{"hier":"a","pct":10,"note":"Neon-pink and faded red only as small punctuation through windows."}]},"curve":"logistic","tension":0,"lmin":5,"lmax":100,"damp":70,"dampCurve":1.5,"dampAmp":55,"dampBias":0,"hueSpace":"cam16","relChroma":false,"chromaFloor":40,"toneMode":"perceptual","vibrancy":0,"palettes":[{"name":"primary-base","hue":229,"chroma":6,"skew":0,"lift":40,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.918,0.012,235]}],"colorName":"Fluorescent saloon white, mid-car","description":"Cool overhead lighting in a JR East 235-series car, reading slightly blue against the platform glow.","colorRole":"dominant","on":true},{"name":"primary-muted","hue":95,"chroma":9,"skew":0,"lift":38,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.838,0.026,88]}],"colorName":"Shōwa-era platform tile, cream","description":"Glazed wall tile of older Yamanote stations; the cream that pre-dates the LED-white re   {"name":"Tram 28 ascending to Largo da Graça","vol":"II","story":{"title":"The narrow climb past the cathedral, where the calçada is half limestone, half basalt, and the tram livery has fifty years of sun on it","kicker":"38° N · May · 11:20 · Tram 28 ascending to Largo da Graça","narrative":"Color from the working tram and the streets it climbs: calçada portuguesa in its two-stone pattern, the sun-faded ochre of an old Carris carriage, building paint dulled toward pink, raw cork from the Alentejo. The blue appears only on the tile; the water is not in this palette.","refuses":"Azulejo cobalt as primary. Lisbon as \"the blue city\" is a postcard premise; the Atlantic light here is cooler and the dominant surface is stone, not tile.","groups":[{"hier":"d","pct":50,"note":"Limestone calçada carries every street and square the tram passes."},{"hier":"s","pct":40,"note":"Basalt seam, faded pink, cork — the working materials of the city, not its tourist signage."},{"hier":"a","pct":10,"note":"Azulejo blue and tram yellow only where they actually exist: on tile and on livery."}]},"curve":"logistic","tension":0,"lmin":5,"lmax":100,"damp":70,"dampCurve":1.5,"dampAmp":55,"dampBias":0,"hueSpace":"cam16","relChroma":false,"chromaFloor":40,"toneMode":"perceptual","vibrancy":0,"palettes":[{"name":"primary-base","hue":92,"chroma":10,"skew":0,"lift":37,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.838,0.03,88]}],"colorName":"Calçada limestone, sun-polished","description":"Pale Estremadura limestone, hand-cut to a 4cm cube; the dominant ground texture of the city.","colorRole":"dominant","on":true},{"name":"primary-muted","hue":11,"chroma":25,"skew":0,"lift":24,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.748,0.062,18]}],"colorName":"Faded paint-on-stucco, Largo das Portas","description":"Building paint near Portas do Sol, originally red oxide, weathered to a dusty pink across one Atlantic decade.","colorRole":"supporting   {"name":"Reynisfjara, south coast of Iceland","vol":"II","story":{"title":"The black-sand beach below the basalt cliff, with the glacial-melt river-mouth still running silt-blue twenty metres offshore","kicker":"63° N · Late August · 15:00 · Reynisfjara, south coast of Iceland","narrative":"Color from a volcanic shore at the end of summer: basalt sand, the milky blue of glacial outwash, undyed Icelandic sheep wool, wind-scoured tussock grass, and late-season invasive lupine gone past its peak. Almost no warm colour. The sky is rarely a contributor here.","refuses":"Aurora green. The northern lights are a winter image and a tourist-board cliché — this is August midday at 63° N, when the sky is overcast and the sun never sets enough to see them.","groups":[{"hier":"d","pct":55,"note":"Basalt sand — the territory's only honest \"neutral.\""},{"hier":"s","pct":35,"note":"Wool cream, glacial silt, tussock grass — the materials that keep the palette from going to charcoal."},{"hier":"a","pct":10,"note":"Late-summer lupine and wet basalt, in small reads only."}]},"curve":"logistic","tension":0,"lmin":5,"lmax":100,"damp":70,"dampCurve":1.5,"dampAmp":55,"dampBias":0,"hueSpace":"cam16","relChroma":false,"chromaFloor":40,"toneMode":"perceptual","vibrancy":0,"palettes":[{"name":"primary-base","hue":268,"chroma":3,"skew":0,"lift":-28,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.262,0.005,280]}],"colorName":"Basalt sand, Reynisfjara","description":"Sub-millimetre fragments of erupted basalt; the only beach surface that reads black even when wet.","colorRole":"dominant","on":true},{"name":"primary-muted","hue":127,"chroma":19,"skew":0,"lift":8,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.548,0.038,118]}],"colorName":"Tussock grass, wind-scoured","description":"Hardy Festuca on the cliff above the beach; the only chlorophyll in the territory and only at small scale.","colorRole":"supporting","on":true},{"name":"secondary   {"name":"Fort Kochi, the hour between two squalls","vol":"II","story":{"title":"Wet laterite walls and Portuguese-import indigo trim, the banyan still dripping, the brass of the temple lamp polished by rain","kicker":"10° N · August · 16:00 · Fort Kochi, the hour between two squalls","narrative":"Color from a colonial port in deep monsoon: exposed laterite rock on every wall and roof, Portuguese-import indigo trim from four hundred years of trading-post construction, banyan leaf still wet, coir rope soaked through, brass diya oil lamps. The sky is slate; the sea is slate; the colour is on the buildings.","refuses":"Tropical-postcard turquoise. The Arabian Sea in monsoon is the colour of slate — using lagoon-blue here misfiles Kerala as the Maldives.","groups":[{"hier":"d","pct":55,"note":"Laterite red is the colour of every wall and roof tile; it carries the territory."},{"hier":"s","pct":35,"note":"Wet banyan, rain-light, coir — the working textures of the port."},{"hier":"a","pct":10,"note":"Indigo and brass only where colonial trade or temple use put them."}]},"curve":"logistic","tension":0,"lmin":5,"lmax":100,"damp":70,"dampCurve":1.5,"dampAmp":55,"dampBias":0,"hueSpace":"cam16","relChroma":false,"chromaFloor":40,"toneMode":"perceptual","vibrancy":0,"palettes":[{"name":"primary-base","hue":35,"chroma":34,"skew":0,"lift":-7,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.488,0.098,38]}],"colorName":"Wet laterite, exposed wall","description":"Iron-rich laterite rock cut into blocks and tile; reads dark and saturated after rain, lighter after the sun returns.","colorRole":"dominant","on":true},{"name":"primary-muted","hue":63,"chroma":16,"skew":0,"lift":-14,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.402,0.038,58]}],"colorName":"Coconut coir, soaked rope","description":"Hand-spun coir from the Alappuzha coast; dark brown when wet, warmer when dry.","colorRole":"supporting","on":true},{"name":"secondary-bas   {"name":"Tórshavn waterfront, thick sea-fog","vol":"III","story":{"title":"A Faroese harbour at half-visibility, where the painted-house pigments are the only saturated colours in fifty metres","kicker":"62° N · September · 09:30 · Tórshavn waterfront, thick sea-fog","narrative":"Color from the North Atlantic in fog: the diffuse grey of sea-mist, tarred-wood cladding on the old harbour buildings, the two paint pigments the Faroese actually maintain — Sjóvinnubankin ochre and turf-roof oxblood, undyed wool and wet peat. There is no real blue in this weather.","refuses":"Any clean blue. Faroese sea-fog has almost no blue in it; introducing one would lie about the visibility and about what the Atlantic actually does to colour up here.","groups":[{"hier":"d","pct":60,"note":"Fog grey reads from sky, sea, and stone all at once."},{"hier":"s","pct":30,"note":"Tarred wood, wool, peat — the structural and material darks."},{"hier":"a","pct":10,"note":"Ochre and oxblood — the painted houses are the entire colour event."}]},"curve":"logistic","tension":0,"lmin":5,"lmax":100,"damp":70,"dampCurve":1.5,"dampAmp":55,"dampBias":0,"hueSpace":"cam16","relChroma":false,"chromaFloor":40,"toneMode":"perceptual","vibrancy":0,"palettes":[{"name":"primary-base","hue":162,"chroma":4,"skew":0,"lift":33,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.802,0.006,138]}],"colorName":"North Atlantic sea-fog, mid-morning","description":"The almost-achromatic grey of a true Faroese mist; reads slightly green only against the painted houses.","colorRole":"dominant","on":true},{"name":"primary-muted","hue":86,"chroma":10,"skew":0,"lift":37,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.838,0.03,85]}],"colorName":"Wool oil cream, raw fleece","description":"Undyed Føroyskt sheep wool with lanolin still in it; the cream of a fisherman's jumper before it is washed.","colorRole":"supporting","on":true},{"name":"secondary-base","hue":71,"chroma":7,"s   {"name":"Ger camp at Övörkhangai, the moment before sunrise","vol":"III","story":{"title":"Inside the felt, with the dung-fire still burning and the door-flap open to the cold blue civil-twilight","kicker":"47° N · October · 05:55 · Ger camp at Övörkhangai, the moment before sunrise","narrative":"Color from a Mongolian ger on the steppe at the end of the warm season: undyed sheep felt on every interior surface, the warm reflection of a dung-fire on the inside wall, the cold blue of civil twilight through the open flap, khadag silk in Tengri blue tied to the door pole, horsehair, wind-borne dust.","refuses":"Saturated grassland green. The \"endless green steppe\" image belongs to June; in October the steppe is straw, dust, and felt — using a green primary here puts you in the wrong month.","groups":[{"hier":"d","pct":60,"note":"Felt is the territory; every other reading is read against it."},{"hier":"s","pct":30,"note":"Steppe dust, horsehair, dawn blue — the working textures of the camp."},{"hier":"a","pct":10,"note":"Hearth-fire and khadag blue, in tiny quantities."}]},"curve":"logistic","tension":0,"lmin":5,"lmax":100,"damp":70,"dampCurve":1.5,"dampAmp":55,"dampBias":0,"hueSpace":"cam16","relChroma":false,"chromaFloor":40,"toneMode":"perceptual","vibrancy":0,"palettes":[{"name":"primary-base","hue":91,"chroma":14,"skew":0,"lift":36,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.828,0.046,88]}],"colorName":"Sheep felt, undyed","description":"The felted-wool covering of the ger, inside and out; the dominant surface of the entire encampment.","colorRole":"dominant","on":true},{"name":"primary-muted","hue":81,"chroma":12,"skew":0,"lift":18,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.668,0.03,78]}],"colorName":"Steppe dust, dawn","description":"Wind-borne loess that coats every flat surface in the camp by morning.","colorRole":"supporting","on":true},{"name":"secondary-base","hue":42,"chroma":17,"skew":0,"lif   {"name":"A wet evening in a Viennese kaffeehaus, Mariahilf","vol":"III","story":{"title":"The working café, not the imperial pageant: marble table, banquette leather, a century of tobacco on the plaster","kicker":"48° N · November · 18:50 · A wet evening in a Viennese kaffeehaus, Mariahilf","narrative":"Color from a kaffeehaus that has not been refurbished: the warm ivory of nicotine-aged plaster overhead, dark banquette leather in the Thonet-era olive that survives in older rooms, oxidised brass hat-racks, the grey-veined marble table top, gilt mirror lettering. The accent is the wet cobble visible through the window.","refuses":"Imperial red. Habsburg-pageant red turns a working café into a tourist set; this kaffeehaus is the one with the regulars and the chess clock, not the one with the souvenir mug.","groups":[{"hier":"d","pct":55,"note":"Tobacco-aged plaster — the literal atmosphere of the room."},{"hier":"s","pct":35,"note":"Marble, banquette green, oxidised brass — the furniture and fittings."},{"hier":"a","pct":10,"note":"Gilt and wet cobble only as flicker."}]},"curve":"logistic","tension":0,"lmin":5,"lmax":100,"damp":70,"dampCurve":1.5,"dampAmp":55,"dampBias":0,"hueSpace":"cam16","relChroma":false,"chromaFloor":40,"toneMode":"perceptual","vibrancy":0,"palettes":[{"name":"primary-base","hue":86,"chroma":14,"skew":0,"lift":34,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.808,0.042,82]}],"colorName":"Nicotine-aged plaster, ceiling","description":"A century of tobacco on the plaster overhead, never washed; the warm ivory that defines a real kaffeehaus interior.","colorRole":"dominant","on":true},{"name":"primary-muted","hue":113,"chroma":4,"skew":0,"lift":38,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.838,0.006,88]}],"colorName":"Marble table top, grey-veined","description":"Carrara-style table marble, cool against the warm plaster above it.","colorRole":"supporting","on":true},{"name":"secondary-b   {"name":"The high-desert road between Taos and Chama","vol":"III","story":{"title":"Late winter on the high desert, with adobe still holding the day's heat and the snow on the north slope already gone blue","kicker":"36° N · February · 16:30 · The high-desert road between Taos and Chama","narrative":"Color from northern New Mexico in late February: adobe walls of Pueblo Revival houses warmed by the low sun, sage across the valley floor, Spanish-colonial blue trim on door and window frames (a regional protective pigment, not decorative), juniper bark, and the cold blue of shaded snow on the Sangre de Cristos.","refuses":"Tourist-shop \"Southwestern turquoise\" as primary. The stone is real; the palette is not. Anchoring on it makes the territory legible only via the souvenir.","groups":[{"hier":"d","pct":55,"note":"Adobe carries the territory; every wall, every road shoulder."},{"hier":"s","pct":35,"note":"Sage, juniper bark, shaded-snow blue — the land's other constants."},{"hier":"a","pct":10,"note":"Door-trim blue and alpenglow peach only where they actually appear."}]},"curve":"logistic","tension":0,"lmin":5,"lmax":100,"damp":70,"dampCurve":1.5,"dampAmp":55,"dampBias":0,"hueSpace":"cam16","relChroma":false,"chromaFloor":40,"toneMode":"perceptual","vibrancy":0,"palettes":[{"name":"primary-base","hue":62,"chroma":24,"skew":0,"lift":21,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.708,0.072,56]}],"colorName":"Adobe wall, low-angle sun","description":"Sun-warmed Pueblo Revival earth wall, read on the south face at 16:30 in February.","colorRole":"dominant","on":true},{"name":"primary-muted","hue":121,"chroma":15,"skew":0,"lift":14,"hueShift":0,"hueSameDir":false,"keyColors":[{"role":"dominant","oklch":[0.598,0.022,108]}],"colorName":"Sage, mountain mahogany","description":"Artemisia tridentata at the valley floor; the only consistent green in the territory.","colorRole":"supporting","on":true},{"name":"secondary-base","hue":60,"chroma":
